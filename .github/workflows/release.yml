name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tokens match ingestion adapter output
        run: |
          npm run import:spectrum --workspace @llp-design/tokens
          git diff --exit-code packages/tokens/tokens

      - name: Build all platform deliverables
        run: npm run build

      # Auth via npm Trusted Publishing (OIDC): the workflow's identity is
      # registered on npmjs.com as the package's trusted publisher, so there
      # is no token to store, leak, or rotate. Provenance is automatic.
      - name: Publish to npm
        working-directory: packages/tokens
        run: npm publish

      - name: Create GitHub Release with latest changelog entry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node -e "
            const fs = require('fs');
            const md = fs.readFileSync('packages/tokens/CHANGELOG.md', 'utf8');
            const entry = md.split(/^## /m).filter(Boolean)[1];
            fs.writeFileSync('release-notes.md', entry ? '## ' + entry : 'See CHANGELOG.md');
          "
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
