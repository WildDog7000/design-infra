name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tokens/ is generated by the ingestion adapter and committed as the
      # pipeline contract — fail if the committed files have drifted from
      # what the adapter actually produces.
      - name: Verify tokens match ingestion adapter output
        run: |
          npm run import:spectrum --workspace @llp-design/tokens
          git diff --exit-code packages/tokens/tokens

      - name: Build all platform deliverables
        run: npm run build

      # components/dist is committed (like the token contract) — fail if it
      # drifts from what the component build actually produces.
      - name: Verify committed component deliverables match build output
        run: git diff --exit-code packages/components/dist

      - name: Run workspace tests (MCP server unit + client E2E)
        run: npm test

      - name: Build-check the remote MCP worker bundle
        working-directory: packages/mcp-remote
        run: npx wrangler deploy --dry-run

      # The demo is a reference consumer: it may only use tokens (no raw
      # colors), and every token it references must exist in the built CSS.
      - name: Check demo consumes the token contract correctly
        run: node packages/demo/check.mjs

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: tokens-dist
          path: packages/tokens/dist
